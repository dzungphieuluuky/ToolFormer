# ───────────────────────────────────────────────────────────────────────────
# GVPO — Group Verification-based Policy Optimization
# Paper: https://openreview.net/pdf?id=RY47Tq0VsV  (ICLR 2026)
# ───────────────────────────────────────────────────────────────────────────
extends: "config/base_config.yaml"

training:
  output_dir: "outputs/gvpo_model"
  max_steps: 600
  num_generations: 8

# Base GRPO settings — PPO-clip loss is unchanged in GVPO.
# Only the ADVANTAGE TENSOR is modified (step-level shaping).
grpo:
  loss_type: "grpo"
  temperature: 1.0
  kl_coef: 0.04
  epsilon: 0.2

gvpo:
  # b — process shaping coefficient  (paper Section 3 / Table 3 ablation)
  # Controls how much process-verifiable feedback modifies per-token advantages
  # relative to the group-level outcome advantage.
  #
  # b=0.0 → degrades to vanilla GRPO (no process shaping)
  # b=1.0 → paper default
  # b=2.0 → stronger process guidance (useful when outcome rewards are sparse)
  #
  # Paper ablation (RQ4, Table 3):
  #   b=0.5 → moderate improvement over GRPO
  #   b=1.0 → best overall performance
  #   b=2.0 → slightly worse (over-weighting process feedback)
  shaping_coeff: 1.0

  # Argument accuracy threshold for a step to be "process-correct"
  # A call must achieve args_accuracy >= this value to get r_proc=1
  args_threshold: 0.8