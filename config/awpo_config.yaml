extends: "config/base_config.yaml"

training:
  output_dir: "outputs/awpo_model"
  max_steps: 600
  num_generations: 8

grpo:
  loss_type: "grpo"
  temperature: 1.0
  kl_coef: 0.04
  # Base clip radius — AWPO will expand this by (1 + δ) when gate opens
  epsilon: 0.2

awpo:
  # Variance gate threshold τ  (Eq. 23)
  # Gate opens (reasoning admitted) when σ²_out ≤ τ
  tau: 0.5

  # Adaptive clip expansion δ  (Section 3.3)
  # ε_eff = ε · (1 + g · δ)
  adaptive_clip_delta: 0.2

  # Outcome component weights  (sum should = 1.0)
  outcome_weights:
    func_selection: 0.4
    args_accuracy:  0.3
    execution:      0.3